<div x-data="{
    username: '',
    password: '',
    confirmPassword: '',
    display_name: '',
    year_group: 9,
    error: '',
    loading: false,

    async signup() {
        this.error = '';
        if (this.password !== this.confirmPassword) {
            this.error = 'Passwords do not match';
            return;
        }
        this.loading = true;
        try {
            const res = await API.post('/auth/signup', {
                username: this.username,
                password: this.password,
                display_name: this.display_name,
                year_group: parseInt(this.year_group)
            });
            API.setToken(res.token);
            $store.app.setUser(res.user);
            $store.app.showToast('Account created!', 'success');
            window.location.hash = '#home';
        } catch (e) {
            this.error = e.message;
        } finally {
            this.loading = false;
        }
    }
}" class="min-h-[80vh] flex items-center justify-center">
    <div class="w-full max-w-sm">
        <div class="bg-white rounded-xl shadow-md p-8">
            <h1 class="text-2xl font-bold text-center text-indigo-600 mb-6">RevisionAid</h1>
            <h2 class="text-lg font-semibold text-center text-gray-700 mb-6">Create Account</h2>

            <!-- First-account notice -->
            <div class="bg-indigo-50 border border-indigo-200 text-indigo-700 text-sm rounded-lg p-3 mb-4 flex gap-2">
                <svg class="w-4 h-4 mt-0.5 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
                    <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd"/>
                </svg>
                <span>The <strong>first account</strong> registered on this server is automatically granted <strong>admin privileges</strong>.</span>
            </div>

            <div x-show="error" class="bg-red-50 text-red-600 text-sm rounded-lg p-3 mb-4" x-text="error"></div>

            <form @submit.prevent="signup" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Display Name</label>
                    <input x-model="display_name" type="text" required placeholder="e.g. Alex"
                           class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                    <input x-model="username" type="text" required autocomplete="username" minlength="3"
                           class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                    <input x-model="password" type="password" required autocomplete="new-password" minlength="6"
                           class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Confirm Password</label>
                    <input x-model="confirmPassword" type="password" required autocomplete="new-password" minlength="6"
                           :class="confirmPassword && password !== confirmPassword ? 'border-red-400 focus:ring-red-400' : 'border-gray-300 focus:ring-indigo-500 focus:border-indigo-500'"
                           class="w-full px-3 py-2 border rounded-lg outline-none focus:ring-2">
                    <p x-show="confirmPassword && password !== confirmPassword"
                       class="text-xs text-red-500 mt-1">Passwords do not match</p>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Year Group</label>
                    <select x-model="year_group"
                            class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none">
                        <template x-for="y in [7,8,9,10,11,12,13]">
                            <option :value="y" x-text="'Year ' + y"></option>
                        </template>
                    </select>
                </div>
                <button type="submit" :disabled="loading"
                        class="w-full bg-indigo-600 text-white py-2.5 rounded-lg font-medium hover:bg-indigo-700 disabled:opacity-50 transition">
                    <span x-show="!loading">Create Account</span>
                    <span x-show="loading">Creating...</span>
                </button>
            </form>

            <p class="text-center text-sm text-gray-500 mt-6">
                Already have an account?
                <a href="#login" class="text-indigo-600 hover:underline font-medium">Log in</a>
            </p>
        </div>
    </div>
</div>
