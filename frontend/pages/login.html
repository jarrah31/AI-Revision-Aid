<div x-data="{
    username: '',
    password: '',
    error: '',
    loading: false,

    async login() {
        this.error = '';
        this.loading = true;
        try {
            const res = await API.post('/auth/login', {
                username: this.username,
                password: this.password
            });
            API.setToken(res.token);
            $store.app.setUser(res.user);
            window.location.hash = '#home';
        } catch (e) {
            this.error = e.message;
        } finally {
            this.loading = false;
        }
    }
}" class="min-h-[80vh] flex items-center justify-center">
    <div class="w-full max-w-sm">
        <div class="bg-white rounded-xl shadow-md p-8">
            <h1 class="text-2xl font-bold text-center text-indigo-600 mb-6">RevisionAid</h1>
            <h2 class="text-lg font-semibold text-center text-gray-700 mb-6">Log In</h2>

            <div x-show="error" class="bg-red-50 text-red-600 text-sm rounded-lg p-3 mb-4" x-text="error"></div>

            <form @submit.prevent="login" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                    <input x-model="username" type="text" required autocomplete="username"
                           class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                    <input x-model="password" type="password" required autocomplete="current-password"
                           class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none">
                </div>
                <button type="submit" :disabled="loading"
                        class="w-full bg-indigo-600 text-white py-2.5 rounded-lg font-medium hover:bg-indigo-700 disabled:opacity-50 transition">
                    <span x-show="!loading">Log In</span>
                    <span x-show="loading">Logging in...</span>
                </button>
            </form>

            <p class="text-center text-sm text-gray-500 mt-6">
                Don't have an account?
                <a href="#signup" class="text-indigo-600 hover:underline font-medium">Sign up</a>
            </p>
        </div>
    </div>
</div>
