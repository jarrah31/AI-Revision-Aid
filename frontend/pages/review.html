<script>
Alpine.data('reviewPage', () => ({
    batchId: null,
    questions: [],
    loading: true,
    currentPage: null,
    pages: [],
    editingId: null,
    editForm: { question_text: '', answer_text: '' },

    // Lightbox
    lightbox: { open: false, src: '' },

    // Fact checks  { [qId]: result }  /  factChecking  { [qId]: bool }  /  factCheckVisible  { [qId]: bool }
    factChecks: {},
    factChecking: {},
    factCheckVisible: {},

    // Full-page image error state (reset when currentPage changes)
    pageImageFailed: false,

    // Categories
    availableCategories: [],
    newCategoryName: '',
    categoryPickerOpen: false,

    async init() {
        this.batchId = window._routeParams?.[0];
        if (!this.batchId) {
            window.location.hash = '#home';
            return;
        }
        this.$watch('currentPage', () => { this.pageImageFailed = false; });
        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && this.lightbox.open) this.closeLightbox();
            if (e.key === 'Escape') this.categoryPickerOpen = false;
        });
        await this.load();
    },

    async load() {
        this.loading = true;
        try {
            const res = await API.get('/questions?batch_id=' + this.batchId + '&limit=200');
            this.questions = res.questions;
            const pageSet = new Set(this.questions.map(q => q.page_number));
            this.pages = [...pageSet].sort((a, b) => a - b);
            if (this.pages.length > 0 && !this.currentPage) {
                this.currentPage = this.pages[0];
            }
            // Pre-populate factChecks from any previously stored results
            const stored = {};
            res.questions.forEach(q => {
                if (q.fact_check_result) {
                    try { stored[q.id] = JSON.parse(q.fact_check_result); } catch (_) {}
                }
            });
            this.factChecks = stored;
            // Load categories for this batch's subject
            await this.loadCategories();
        } catch (e) {
            this.$store.app.showToast('Failed to load questions', 'error');
        } finally {
            this.loading = false;
        }
    },

    async loadCategories() {
        const subjectId = this.questions[0]?.subject_id;
        if (!subjectId) return;
        try {
            this.availableCategories = await API.get('/categories?subject_id=' + subjectId);
        } catch (e) { /* non-critical */ }
    },

    get filteredQuestions() {
        if (!this.currentPage) return this.questions;
        return this.questions.filter(q => q.page_number === this.currentPage);
    },

    get approvedCount() {
        return this.questions.filter(q => q.approved).length;
    },

    get pageImageUrl() {
        if (!this.batchId || !this.currentPage) return '';
        return '/images/batch_' + this.batchId + '/page_' + this.currentPage + '_full.png';
    },

    // Category helpers
    get currentPageCategoryId() {
        return this.filteredQuestions[0]?.category_id ?? null;
    },

    get currentPageCategoryName() {
        const id = this.currentPageCategoryId;
        if (!id) return null;
        return this.availableCategories.find(c => c.id === id)?.name ?? null;
    },

    pageCategory(pageNum) {
        const q = this.questions.find(q => q.page_number === pageNum);
        if (!q?.category_id) return null;
        return this.availableCategories.find(c => c.id === q.category_id)?.name ?? null;
    },

    async setPageCategory(categoryId) {
        const subjectId = this.questions[0]?.subject_id;
        try {
            await API.post('/categories/assign-page', {
                batch_id: parseInt(this.batchId),
                page_number: this.currentPage,
                category_id: categoryId,
            });
            // Update local question state
            this.questions.forEach(q => {
                if (q.page_number === this.currentPage) {
                    q.category_id = categoryId;
                    q.category_name = categoryId
                        ? (this.availableCategories.find(c => c.id === categoryId)?.name ?? null)
                        : null;
                }
            });
            this.categoryPickerOpen = false;
        } catch (e) {
            this.$store.app.showToast('Failed to set category', 'error');
        }
    },

    async createAndAssignCategory() {
        const name = this.newCategoryName.trim();
        if (!name) return;
        const subjectId = this.questions[0]?.subject_id;
        if (!subjectId) return;
        try {
            const cat = await API.post('/categories', { name, subject_id: subjectId });
            this.availableCategories = [...this.availableCategories, cat].sort((a, b) => a.name.localeCompare(b.name));
            this.newCategoryName = '';
            await this.setPageCategory(cat.id);
        } catch (e) {
            this.$store.app.showToast(
                e.message?.includes('already exists') ? 'Category already exists' : 'Failed to create category',
                'error'
            );
        }
    },

    openLightbox(src) {
        this.lightbox.src = src;
        this.lightbox.open = true;
    },

    closeLightbox() {
        this.lightbox.open = false;
    },

    async doFactCheck(id) {
        if (this.factChecking[id]) return;
        // Already cached in memory — just toggle the panel
        if (this.factChecks[id]) {
            this.factCheckVisible = { ...this.factCheckVisible, [id]: !this.factCheckVisible[id] };
            return;
        }
        // Fetch (backend returns DB cache or calls Claude)
        this.factChecking = { ...this.factChecking, [id]: true };
        await this.$nextTick(); // ensure spinner renders before API call
        try {
            const result = await API.post('/questions/' + id + '/fact-check');
            this.factChecks = { ...this.factChecks, [id]: result };
            this.factCheckVisible = { ...this.factCheckVisible, [id]: true };
        } catch (e) {
            this.$store.app.showToast('Fact check failed – ' + (e.message || 'unknown error'), 'error');
        } finally {
            this.factChecking = { ...this.factChecking, [id]: false };
        }
    },

    verdictStyle(verdict) {
        return {
            correct:   'bg-green-50  border-green-300  text-green-900',
            incorrect: 'bg-red-50    border-red-300    text-red-900',
            uncertain: 'bg-yellow-50 border-yellow-300 text-yellow-900',
        }[verdict] || 'bg-gray-50 border-gray-200 text-gray-800';
    },

    verdictIcon(verdict) {
        return { correct: '✅', incorrect: '❌', uncertain: '⚠️' }[verdict] || '🔍';
    },

    verdictButtonClass(verdict) {
        return {
            correct:   'text-green-600',
            incorrect: 'text-red-600',
            uncertain: 'text-amber-600',
        }[verdict] || 'text-purple-600';
    },

    startEdit(q) {
        this.editingId = q.id;
        this.editForm = { question_text: q.question_text, answer_text: q.answer_text };
    },

    cancelEdit() {
        this.editingId = null;
    },

    async saveEdit(id) {
        try {
            await API.put('/questions/' + id, this.editForm);
            const q = this.questions.find(q => q.id === id);
            if (q) {
                q.question_text = this.editForm.question_text;
                q.answer_text = this.editForm.answer_text;
            }
            this.editingId = null;
            this.$store.app.showToast('Question updated', 'success');
        } catch (e) {
            this.$store.app.showToast('Failed to update', 'error');
        }
    },

    async approve(id) {
        try {
            await API.post('/questions/' + id + '/approve');
            const q = this.questions.find(q => q.id === id);
            if (q) q.approved = 1;
        } catch (e) {
            this.$store.app.showToast('Failed to approve', 'error');
        }
    },

    async approveAll() {
        try {
            const res = await API.post('/questions/approve-batch?batch_id=' + this.batchId);
            this.questions.forEach(q => q.approved = 1);
            this.$store.app.showToast(res.message, 'success');
        } catch (e) {
            this.$store.app.showToast('Failed to approve', 'error');
        }
    },

    async approvePageQuestions() {
        try {
            const res = await API.post(
                '/questions/approve-page?batch_id=' + this.batchId + '&page_number=' + this.currentPage
            );
            this.questions.forEach(q => {
                if (q.page_number === this.currentPage) q.approved = 1;
            });
            this.$store.app.showToast(res.message, 'success');
        } catch (e) {
            this.$store.app.showToast('Failed to approve page', 'error');
        }
    },

    async remove(id) {
        if (!confirm('Delete this question?')) return;
        try {
            await API.del('/questions/' + id);
            this.questions = this.questions.filter(q => q.id !== id);
            this.$store.app.showToast('Question deleted', 'success');
        } catch (e) {
            this.$store.app.showToast('Failed to delete', 'error');
        }
    }
}));
</script>

<div x-data="reviewPage">
    <div class="flex items-center justify-between mb-4">
        <h1 class="text-2xl font-bold text-gray-800">Review Questions</h1>
        <div class="flex items-center gap-3">
            <span class="text-sm text-gray-500">
                <span x-text="approvedCount"></span>/<span x-text="questions.length"></span> approved
            </span>
            <button @click="approveAll()"
                    class="bg-green-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-green-700 transition">
                Approve All
            </button>
        </div>
    </div>

    <!-- Page tabs -->
    <div class="flex gap-2 mb-4 overflow-x-auto pb-2">
        <template x-for="p in pages" :key="p">
            <button @click="currentPage = p"
                    :class="currentPage === p ? 'bg-indigo-600 text-white' : 'bg-white text-gray-700 hover:bg-gray-50'"
                    class="px-3 py-1.5 rounded-lg text-sm font-medium whitespace-nowrap shadow-sm transition flex items-center gap-1.5">
                <span x-text="'Page ' + p"></span>
                <span x-show="pageCategory(p)"
                      class="text-xs font-normal opacity-70"
                      x-text="'· ' + pageCategory(p)"></span>
            </button>
        </template>
    </div>

    <div x-show="loading" class="text-center py-8 text-gray-400">Loading...</div>

    <!-- Split view: PDF page + questions -->
    <div x-show="!loading" class="flex flex-col lg:flex-row gap-4">

        <!-- PDF page image (right on desktop, top on mobile) -->
        <div class="lg:w-1/2 order-first lg:order-last">
            <div class="bg-white rounded-xl shadow-sm p-2 sticky top-16">
                <!-- x-if prevents empty src="" from triggering the error handler -->
                <template x-if="pageImageUrl && !pageImageFailed">
                    <div class="relative group cursor-zoom-in" @click="openLightbox(pageImageUrl)">
                        <img :src="pageImageUrl" alt="PDF page"
                             class="w-full rounded-lg border border-gray-200"
                             @error="pageImageFailed = true">
                        <!-- Zoom hint overlay -->
                        <div class="absolute inset-0 flex items-center justify-center rounded-lg
                                    bg-black/0 group-hover:bg-black/20 transition-colors pointer-events-none">
                            <div class="opacity-0 group-hover:opacity-100 transition-opacity
                                        bg-black/60 text-white text-xs font-medium px-3 py-1.5 rounded-full flex items-center gap-1.5">
                                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                          d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0zm0 0l2 2"/>
                                </svg>
                                Click to enlarge
                            </div>
                        </div>
                    </div>
                </template>
            </div>
        </div>

        <!-- Questions list -->
        <div class="lg:w-1/2 space-y-3">

            <!-- Per-page category picker -->
            <div class="flex items-center gap-2 bg-white rounded-xl shadow-sm px-4 py-2.5">
                <span class="text-xs font-medium text-gray-500 shrink-0">Category:</span>
                <span x-show="currentPageCategoryName"
                      class="text-xs px-2 py-0.5 bg-indigo-100 text-indigo-700 rounded-full font-medium"
                      x-text="currentPageCategoryName"></span>
                <span x-show="!currentPageCategoryName"
                      class="text-xs text-gray-400 italic">None</span>

                <!-- Approve this page -->
                <button x-show="filteredQuestions.some(q => !q.approved)"
                        @click="approvePageQuestions()"
                        class="ml-auto flex items-center gap-1 px-2.5 py-1 bg-green-600 hover:bg-green-700
                               text-white text-xs font-medium rounded-full transition-colors shrink-0">
                    Approve Page
                </button>

                <!-- Picker toggle -->
                <div class="relative" :class="filteredQuestions.some(q => !q.approved) ? '' : 'ml-auto'">
                    <button @click="categoryPickerOpen = !categoryPickerOpen"
                            class="text-xs text-indigo-600 hover:underline">
                        <span x-text="currentPageCategoryName ? 'Change' : 'Set category'"></span>
                    </button>

                    <!-- Dropdown -->
                    <div x-show="categoryPickerOpen"
                         @click.away="categoryPickerOpen = false"
                         x-transition:enter="transition ease-out duration-100"
                         x-transition:enter-start="opacity-0 scale-95"
                         x-transition:enter-end="opacity-100 scale-100"
                         class="absolute right-0 top-7 bg-white shadow-lg rounded-xl border border-gray-200 p-2 z-20 w-52"
                         style="display:none">
                        <p class="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-1.5 px-1">Select category</p>

                        <button @click="setPageCategory(null)"
                                :class="!currentPageCategoryId ? 'bg-gray-100 text-gray-600' : 'text-gray-500 hover:bg-gray-50'"
                                class="w-full text-left text-xs px-2 py-1.5 rounded-lg">
                            — None
                        </button>

                        <template x-for="cat in availableCategories" :key="cat.id">
                            <button @click="setPageCategory(cat.id)"
                                    :class="cat.id === currentPageCategoryId ? 'bg-indigo-50 text-indigo-700 font-medium' : 'text-gray-700 hover:bg-gray-50'"
                                    class="w-full text-left text-xs px-2 py-1.5 rounded-lg"
                                    x-text="cat.name">
                            </button>
                        </template>

                        <!-- New category input -->
                        <div class="border-t border-gray-100 mt-1.5 pt-1.5">
                            <p class="text-xs text-gray-400 px-1 mb-1">New category</p>
                            <div class="flex gap-1 px-1">
                                <input x-model="newCategoryName"
                                       @keydown.enter.prevent="createAndAssignCategory()"
                                       class="flex-1 text-xs border border-gray-200 rounded-lg px-2 py-1.5 outline-none focus:ring-1 focus:ring-indigo-400"
                                       placeholder="e.g. B1 Cells">
                                <button @click="createAndAssignCategory()"
                                        :disabled="!newCategoryName.trim()"
                                        class="text-xs bg-indigo-600 hover:bg-indigo-700 disabled:opacity-40 text-white px-2.5 py-1.5 rounded-lg transition">
                                    +
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <template x-for="q in filteredQuestions" :key="q.id">
                <div class="bg-white rounded-xl shadow-sm p-4 border-l-4 transition"
                     :class="q.approved ? 'border-green-500' : 'border-yellow-400'">

                    <!-- View mode -->
                    <div x-show="editingId !== q.id">
                        <div class="flex items-start justify-between gap-2">
                            <div class="flex-1">
                                <p class="font-medium text-gray-800 text-sm" x-text="q.question_text"></p>
                                <p class="text-gray-600 text-sm mt-1" x-text="q.answer_text"></p>
                            </div>
                            <div class="flex items-center gap-1 flex-shrink-0">
                                <span class="text-xs px-2 py-0.5 rounded-full"
                                      :class="q.approved ? 'bg-green-100 text-green-700' : 'bg-yellow-100 text-yellow-700'"
                                      x-text="q.approved ? 'Approved' : 'Pending'"></span>
                            </div>
                        </div>

                        <!-- Cropped question image (clickable) -->
                        <div x-show="q.image_filename"
                             class="mt-2 inline-block relative group cursor-zoom-in"
                             @click="openLightbox('/images/' + q.image_filename)">
                            <img :src="'/images/' + q.image_filename"
                                 class="max-h-32 rounded border border-gray-200 block"
                                 @error="$el.parentElement.style.display='none'">
                            <!-- Zoom hint overlay -->
                            <div class="absolute inset-0 flex items-center justify-center rounded
                                        bg-black/0 group-hover:bg-black/20 transition-colors pointer-events-none">
                                <div class="opacity-0 group-hover:opacity-100 transition-opacity
                                            bg-black/60 text-white text-xs px-2 py-1 rounded-full flex items-center gap-1">
                                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                              d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z"/>
                                    </svg>
                                    Enlarge
                                </div>
                            </div>
                        </div>

                        <!-- Full exam page for past paper questions (no cropped image exists,
                             but the page may contain diagrams/graphs the question refers to) -->
                        <div x-show="q.question_source === 'past_paper' && !q.image_filename"
                             class="mt-2 inline-block relative group cursor-zoom-in"
                             @click="openLightbox('/images/batch_' + q.batch_id + '/page_' + q.page_number + '_full.png')">
                            <img :src="'/images/batch_' + q.batch_id + '/page_' + q.page_number + '_full.png'"
                                 class="max-h-48 rounded border border-gray-200 block"
                                 @error="$el.parentElement.style.display='none'">
                            <div class="absolute inset-0 flex items-center justify-center rounded
                                        bg-black/0 group-hover:bg-black/20 transition-colors pointer-events-none">
                                <div class="opacity-0 group-hover:opacity-100 transition-opacity
                                            bg-black/60 text-white text-xs px-2 py-1 rounded-full flex items-center gap-1">
                                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                              d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z"/>
                                    </svg>
                                    Enlarge
                                </div>
                            </div>
                        </div>

                        <div class="flex items-center gap-2 mt-3 flex-wrap">
                            <span class="text-xs text-gray-400" x-text="q.question_type + ' | Difficulty: ' + q.difficulty"></span>
                            <!-- Source badge -->
                            <template x-if="q.question_source === 'past_paper'">
                                <span class="inline-flex items-center gap-1 text-xs px-2 py-0.5 rounded-full bg-blue-100 text-blue-700 font-medium">
                                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                                    <span x-text="q.question_source_detail || 'Past Paper'"></span>
                                </span>
                            </template>
                            <template x-if="!q.question_source || q.question_source === 'ai_generated'">
                                <span class="text-xs px-2 py-0.5 rounded-full bg-gray-100 text-gray-500">🤖 AI Generated</span>
                            </template>
                            <div class="flex-1"></div>
                            <button @click="startEdit(q)"
                                    class="text-xs text-indigo-600 hover:underline">Edit</button>
                            <button @click="doFactCheck(q.id)"
                                    class="text-xs hover:underline flex items-center gap-1"
                                    :class="[factChecking[q.id] ? 'opacity-40 cursor-default' : '', verdictButtonClass(factChecks[q.id]?.verdict)]">
                                <!-- Spinner state -->
                                <span x-show="factChecking[q.id]" class="flex items-center gap-1">
                                    <svg class="animate-spin w-3 h-3" fill="none" viewBox="0 0 24 24">
                                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"></path>
                                    </svg>
                                    Checking…
                                </span>
                                <!-- Cached result state: show verdict icon + Show/Hide -->
                                <span x-show="!factChecking[q.id] && factChecks[q.id]" class="flex items-center gap-1">
                                    <span x-text="verdictIcon(factChecks[q.id]?.verdict)"></span>
                                    <span x-text="factCheckVisible[q.id] ? 'Hide result' : 'Show result'"></span>
                                </span>
                                <!-- Default state: no result yet -->
                                <span x-show="!factChecking[q.id] && !factChecks[q.id]">🔍 Fact Check</span>
                            </button>
                            <button @click="remove(q.id)"
                                    class="text-xs text-red-500 hover:underline">Delete</button>
                            <button x-show="!q.approved" @click="approve(q.id)"
                                    class="flex items-center gap-1 px-2.5 py-1 bg-green-600 hover:bg-green-700
                                           text-white text-xs font-medium rounded-full transition-colors">
                                Approve?
                            </button>
                        </div>

                        <!-- Fact Check result panel -->
                        <div x-show="factCheckVisible[q.id] && factChecks[q.id]"
                             x-transition:enter="transition ease-out duration-150"
                             x-transition:enter-start="opacity-0 -translate-y-1"
                             x-transition:enter-end="opacity-100 translate-y-0"
                             class="mt-3 rounded-lg border p-3 text-sm"
                             :class="verdictStyle(factChecks[q.id]?.verdict)"
                             style="display:none">
                            <!-- Verdict header -->
                            <div class="flex items-center justify-between mb-2">
                                <div class="flex items-center gap-2 font-semibold">
                                    <span x-text="verdictIcon(factChecks[q.id]?.verdict)"></span>
                                    <span x-text="(factChecks[q.id]?.verdict || '').toUpperCase()"></span>
                                    <span x-show="factChecks[q.id]?.searches_performed"
                                          class="text-xs font-normal opacity-60"
                                          x-text="'(' + factChecks[q.id]?.searches_performed + ' web search' + (factChecks[q.id]?.searches_performed !== 1 ? 'es' : '') + ')'">
                                    </span>
                                </div>
                                <button @click="factCheckVisible = { ...factCheckVisible, [q.id]: false }"
                                        class="opacity-50 hover:opacity-100 text-xs">✕</button>
                            </div>

                            <!-- Explanation -->
                            <p class="text-xs leading-relaxed mb-2 whitespace-pre-wrap"
                               x-text="factChecks[q.id]?.explanation"></p>

                            <!-- Sources -->
                            <div x-show="factChecks[q.id]?.sources?.length > 0">
                                <p class="text-xs font-semibold mb-1 opacity-70">Sources:</p>
                                <template x-for="src in (factChecks[q.id]?.sources || [])" :key="src.url">
                                    <div class="mb-1">
                                        <a :href="src.url" target="_blank" rel="noopener noreferrer"
                                           class="text-xs underline hover:opacity-80 break-all"
                                           x-text="src.title || src.url"></a>
                                        <p x-show="src.snippet"
                                           class="text-xs opacity-60 mt-0.5 line-clamp-2"
                                           x-text="src.snippet"></p>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </div>

                    <!-- Edit mode -->
                    <div x-show="editingId === q.id" class="space-y-3">
                        <div>
                            <label class="text-xs font-medium text-gray-500">Question</label>
                            <textarea x-model="editForm.question_text" rows="2"
                                      class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 outline-none"></textarea>
                        </div>
                        <div>
                            <label class="text-xs font-medium text-gray-500">Answer</label>
                            <textarea x-model="editForm.answer_text" rows="2"
                                      class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 outline-none"></textarea>
                        </div>
                        <div class="flex gap-2">
                            <button @click="saveEdit(q.id)"
                                    class="px-3 py-1.5 bg-indigo-600 text-white rounded-lg text-sm hover:bg-indigo-700">Save</button>
                            <button @click="cancelEdit()"
                                    class="px-3 py-1.5 bg-gray-100 text-gray-700 rounded-lg text-sm hover:bg-gray-200">Cancel</button>
                        </div>
                    </div>
                </div>
            </template>

            <div x-show="filteredQuestions.length === 0" class="text-center py-8 text-gray-400">
                No questions for this page.
            </div>
        </div>
    </div>

    <!-- Lightbox modal -->
    <div x-show="lightbox.open"
         x-transition:enter="transition ease-out duration-150"
         x-transition:enter-start="opacity-0"
         x-transition:enter-end="opacity-100"
         x-transition:leave="transition ease-in duration-100"
         x-transition:leave-start="opacity-100"
         x-transition:leave-end="opacity-0"
         class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/80 cursor-zoom-out"
         @click.self="closeLightbox()"
         style="display: none;">

        <!-- Close button -->
        <button @click="closeLightbox()"
                class="absolute top-4 right-4 text-white/80 hover:text-white transition
                       bg-black/40 hover:bg-black/60 rounded-full w-10 h-10 flex items-center justify-center z-10">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
            </svg>
        </button>

        <!-- Image -->
        <img :src="lightbox.src"
             x-transition:enter="transition ease-out duration-150"
             x-transition:enter-start="scale-95 opacity-0"
             x-transition:enter-end="scale-100 opacity-100"
             class="max-w-full max-h-full object-contain rounded-lg shadow-2xl cursor-default"
             style="max-height: calc(100vh - 2rem); max-width: calc(100vw - 2rem)"
             @click.stop>
    </div>
</div>
