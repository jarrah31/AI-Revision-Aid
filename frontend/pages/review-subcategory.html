<script>
Alpine.data('reviewSubcategoryPage', () => ({
    subcategoryId: null,
    subcategory: null,     // { id, name, category_id, category_name, subject_id, subject_name }
    questions: [],
    loading: true,
    editingId: null,
    editForm: { question_text: '', answer_text: '' },
    showSource: {},        // { [qId]: bool }
    approvingAll: false,

    async init() {
        this.subcategoryId = parseInt(window._routeParams?.[0]);
        if (!this.subcategoryId) {
            window.location.hash = '#subjects';
            return;
        }
        await Promise.all([this.loadSubcategory(), this.loadQuestions()]);
    },

    async loadSubcategory() {
        try {
            this.subcategory = await API.get('/subcategories/' + this.subcategoryId);
        } catch (_) {
            // Non-critical — fall back to question metadata
        }
    },

    async loadQuestions() {
        this.loading = true;
        try {
            const res = await API.get('/questions?subcategory_id=' + this.subcategoryId + '&limit=200');
            this.questions = res.questions;
        } catch (e) {
            Alpine.store('app').showToast('Failed to load questions', 'error');
        } finally {
            this.loading = false;
        }
    },

    get subjectName() {
        return this.subcategory?.subject_name || this.questions[0]?.subject_name || '';
    },

    get categoryName() {
        return this.subcategory?.category_name || this.questions[0]?.category_name || '';
    },

    get categoryId() {
        return this.subcategory?.category_id || this.questions[0]?.category_id || null;
    },

    get subcategoryName() {
        return this.subcategory?.name || this.questions[0]?.subcategory_name || 'Sub-Category';
    },

    get approvedCount() {
        return this.questions.filter(q => q.approved).length;
    },

    get pendingCount() {
        return this.questions.filter(q => !q.approved).length;
    },

    toggleSource(id) {
        this.showSource = { ...this.showSource, [id]: !this.showSource[id] };
    },

    pageImageUrl(q) {
        return '/images/batch_' + q.batch_id + '/page_' + q.page_number + '_full.png';
    },

    startEdit(q) {
        this.editingId = q.id;
        this.editForm = { question_text: q.question_text, answer_text: q.answer_text };
    },

    cancelEdit() {
        this.editingId = null;
    },

    async saveEdit(id) {
        try {
            await API.put('/questions/' + id, this.editForm);
            const q = this.questions.find(q => q.id === id);
            if (q) {
                q.question_text = this.editForm.question_text;
                q.answer_text = this.editForm.answer_text;
            }
            this.editingId = null;
            Alpine.store('app').showToast('Question updated', 'success');
        } catch (e) {
            Alpine.store('app').showToast('Failed to update', 'error');
        }
    },

    async approve(id) {
        try {
            await API.post('/questions/' + id + '/approve');
            const q = this.questions.find(q => q.id === id);
            if (q) q.approved = 1;
        } catch (e) {
            Alpine.store('app').showToast('Failed to approve', 'error');
        }
    },

    async approveAll() {
        const pending = this.questions.filter(q => !q.approved);
        if (!pending.length) return;
        this.approvingAll = true;
        try {
            await Promise.all(pending.map(q => API.post('/questions/' + q.id + '/approve')));
            this.questions.forEach(q => { q.approved = 1; });
            Alpine.store('app').showToast(pending.length + ' question' + (pending.length !== 1 ? 's' : '') + ' approved', 'success');
        } catch (e) {
            Alpine.store('app').showToast('Failed to approve all', 'error');
        } finally {
            this.approvingAll = false;
        }
    },

    async remove(id) {
        if (!confirm('Delete this question?')) return;
        try {
            await API.del('/questions/' + id);
            this.questions = this.questions.filter(q => q.id !== id);
            Alpine.store('app').showToast('Question deleted', 'success');
        } catch (e) {
            Alpine.store('app').showToast('Failed to delete', 'error');
        }
    }
}));
</script>

<div x-data="reviewSubcategoryPage">

    <!-- Breadcrumb + header -->
    <div class="mb-5">
        <nav class="flex items-center gap-1.5 text-sm text-gray-400 mb-2">
            <a href="#subjects" class="hover:text-indigo-600 transition">Subjects</a>
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
            </svg>
            <span class="text-gray-600" x-text="subjectName"></span>
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
            </svg>
            <a :href="categoryId ? '#review-category/' + categoryId : '#subjects'"
               class="hover:text-indigo-600 transition" x-text="categoryName"></a>
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
            </svg>
            <span class="text-gray-800 font-medium" x-text="subcategoryName"></span>
        </nav>

        <div class="flex items-center justify-between gap-3 flex-wrap">
            <div>
                <h1 class="text-2xl font-bold text-gray-800" x-text="subcategoryName"></h1>
                <p x-show="categoryName" class="text-sm text-gray-400 mt-0.5" x-text="categoryName"></p>
                <p x-show="!loading" class="text-sm text-gray-500 mt-0.5">
                    <span x-text="approvedCount"></span>/<span x-text="questions.length"></span> approved
                    <span x-show="pendingCount > 0" class="text-yellow-600 ml-1">
                        · <span x-text="pendingCount"></span> pending
                    </span>
                </p>
            </div>
            <button x-show="!loading && pendingCount > 0"
                    @click="approveAll()"
                    :disabled="approvingAll"
                    class="inline-flex items-center gap-2 px-4 py-2 bg-green-600 text-white rounded-lg text-sm font-medium hover:bg-green-700 transition disabled:opacity-50 disabled:cursor-not-allowed">
                <svg x-show="approvingAll" class="animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                </svg>
                <span x-text="approvingAll ? 'Approving…' : 'Approve All'"></span>
            </button>
        </div>
    </div>

    <!-- Loading -->
    <div x-show="loading" class="text-center py-12 text-gray-400">Loading questions…</div>

    <!-- Empty state -->
    <div x-show="!loading && questions.length === 0"
         class="text-center py-12 bg-white rounded-xl shadow-sm">
        <p class="text-gray-500">No questions found in this sub-category.</p>
        <a href="#subjects" class="text-sm text-indigo-600 hover:underline mt-2 inline-block">← Back to Subjects</a>
    </div>

    <!-- Question list -->
    <div x-show="!loading && questions.length > 0" class="space-y-3">
        <template x-for="q in questions" :key="q.id">
            <div class="bg-white rounded-xl shadow-sm p-4 border-l-4 transition"
                 :class="q.approved ? 'border-green-500' : 'border-yellow-400'">

                <!-- View mode -->
                <div x-show="editingId !== q.id">
                    <div class="flex items-start justify-between gap-2">
                        <div class="flex-1 min-w-0">
                            <p class="font-medium text-gray-800 text-sm" x-text="q.question_text"></p>
                            <p class="text-gray-600 text-sm mt-1" x-text="q.answer_text"></p>
                        </div>
                        <span class="text-xs px-2 py-0.5 rounded-full shrink-0"
                              :class="q.approved ? 'bg-green-100 text-green-700' : 'bg-yellow-100 text-yellow-700'"
                              x-text="q.approved ? 'Approved' : 'Pending'"></span>
                    </div>

                    <!-- Cropped image if present -->
                    <div x-show="q.image_filename" class="mt-2">
                        <img :src="'/images/' + q.image_filename"
                             class="max-h-28 rounded border border-gray-200"
                             @error="$el.parentElement.style.display='none'">
                    </div>

                    <!-- Full exam page for past paper questions -->
                    <div x-show="q.question_source === 'past_paper' && !q.image_filename"
                         class="mt-2 cursor-zoom-in"
                         @click="window.open(pageImageUrl(q), '_blank')">
                        <img :src="pageImageUrl(q)"
                             class="max-h-48 rounded border border-gray-200 hover:opacity-90 transition-opacity"
                             @error="$el.parentElement.style.display='none'"
                             title="Click to open full size">
                    </div>

                    <!-- Metadata + actions -->
                    <div class="flex items-center gap-3 mt-3 flex-wrap">
                        <span class="text-xs text-gray-400"
                              x-text="q.question_type + ' · Difficulty: ' + q.difficulty"></span>
                        <span class="text-xs text-gray-300">·</span>
                        <span class="text-xs text-gray-400"
                              x-text="'Page ' + q.page_number"></span>

                        <!-- Source badge -->
                        <template x-if="q.question_source === 'past_paper'">
                            <span class="inline-flex items-center gap-1 text-xs px-2 py-0.5 rounded-full bg-blue-100 text-blue-700 font-medium">
                                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                                <span x-text="q.question_source_detail || 'Past Paper'"></span>
                            </span>
                        </template>
                        <template x-if="!q.question_source || q.question_source === 'ai_generated'">
                            <span class="text-xs px-2 py-0.5 rounded-full bg-gray-100 text-gray-500">🤖 AI Generated</span>
                        </template>

                        <!-- Source toggle -->
                        <button @click="toggleSource(q.id)"
                                class="text-xs text-indigo-500 hover:text-indigo-700 flex items-center gap-1">
                            <span x-text="showSource[q.id] ? '▲ Hide source' : '▼ Source'"></span>
                        </button>

                        <div class="flex-1"></div>
                        <button @click="startEdit(q)"
                                class="text-xs text-indigo-600 hover:underline">Edit</button>
                        <button @click="remove(q.id)"
                                class="text-xs text-red-500 hover:underline">Delete</button>
                        <button x-show="!q.approved"
                                @click="approve(q.id)"
                                class="flex items-center gap-1 px-2.5 py-1 bg-green-600 hover:bg-green-700
                                       text-white text-xs font-medium rounded-full transition-colors">
                            ✓ Approve
                        </button>
                    </div>

                    <!-- Source panel -->
                    <div x-show="showSource[q.id]"
                         x-transition:enter="transition ease-out duration-150"
                         x-transition:enter-start="opacity-0 -translate-y-1"
                         x-transition:enter-end="opacity-100 translate-y-0"
                         class="mt-3 space-y-3"
                         style="display:none">

                        <!-- Source quote -->
                        <blockquote x-show="q.source_context"
                                    class="border-l-2 border-indigo-300 pl-3 text-xs text-gray-600 italic"
                                    x-text="q.source_context"></blockquote>

                        <!-- Page thumbnail -->
                        <div x-show="q.batch_id && q.page_number"
                             class="rounded-lg border border-gray-200 overflow-hidden">
                            <p class="text-xs text-gray-400 bg-gray-50 px-2 py-1 border-b border-gray-100"
                               x-text="'Page ' + q.page_number + ' of batch #' + q.batch_id"></p>
                            <img :src="pageImageUrl(q)"
                                 class="w-full max-h-64 object-top object-cover"
                                 @error="$el.parentElement.style.display='none'">
                        </div>
                    </div>
                </div>

                <!-- Edit mode -->
                <div x-show="editingId === q.id" class="space-y-3">
                    <div>
                        <label class="text-xs font-medium text-gray-500">Question</label>
                        <textarea x-model="editForm.question_text" rows="2"
                                  class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 outline-none"></textarea>
                    </div>
                    <div>
                        <label class="text-xs font-medium text-gray-500">Answer</label>
                        <textarea x-model="editForm.answer_text" rows="2"
                                  class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 outline-none"></textarea>
                    </div>
                    <div class="flex gap-2">
                        <button @click="saveEdit(q.id)"
                                class="px-3 py-1.5 bg-indigo-600 text-white rounded-lg text-sm hover:bg-indigo-700">Save</button>
                        <button @click="cancelEdit()"
                                class="px-3 py-1.5 bg-gray-100 text-gray-700 rounded-lg text-sm hover:bg-gray-200">Cancel</button>
                    </div>
                </div>
            </div>
        </template>
    </div>
</div>
