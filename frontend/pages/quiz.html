<div x-data="{
    // Setup state
    phase: 'setup',
    subjects: [],
    subjectId: '',
    categoryId: null,
    subjectCategories: {},   // subject_id → [categories]
    questionSources: [],     // [] = all; ['ai_generated'] or ['past_paper'] to restrict
    count: 20,
    mode: 'mixed',
    availableCount: null,
    loadingSetup: true,
    startingQuiz: false,

    // Quiz state
    savedQuizzes: [],
    sessionId: null,
    questions: [],
    currentIndex: 0,
    showAnswer: false,
    typedAnswer: '',
    selectedOption: null,
    result: null,
    submitting: false,
    startTime: null,
    selectedQuality: null,
    showSource: false,
    lightboxSrc: null,

    // Summary
    summary: null,

    async init() {
        // Check if subject passed in URL
        const subjectParam = window._routeParams?.[0];
        if (subjectParam) this.subjectId = parseInt(subjectParam);

        try {
            this.subjects = await API.get('/subjects');
            if (!this.subjectId && this.subjects.length > 0) {
                this.subjectId = '';
            }
        } catch (e) {
            $store.app.showToast('Failed to load subjects', 'error');
        } finally {
            this.loadingSetup = false;
        }
        this.loadAvailableCount();
        this.$watch('subjectId',       () => this.loadAvailableCount());
        this.$watch('categoryId',      () => this.loadAvailableCount());
        this.$watch('questionSources', () => this.loadAvailableCount());
        sessionStorage.removeItem('ra_quiz'); // clean up old single-quiz key
        localStorage.removeItem('ra_quizzes'); // clean up old localStorage key
        await this._loadSavedQuizzes();
    },

    async selectSubject(id) {
        this.subjectId = id === null ? '' : id;
        this.categoryId = null;
        if (id && !this.subjectCategories[id]) {
            try {
                const cats = await API.get('/categories?subject_id=' + id);
                this.subjectCategories = { ...this.subjectCategories, [id]: cats };
            } catch (e) { /* non-critical */ }
        }
    },

    loadAvailableCount() {
        clearTimeout(this._countTimer);
        this._countTimer = setTimeout(async () => {
            const params = new URLSearchParams();
            if (this.subjectId)  params.set('subject_id',  this.subjectId);
            if (this.categoryId) params.set('category_id', this.categoryId);
            this.questionSources.forEach(s => params.append('question_sources', s));
            try {
                const res = await API.get('/quiz/count?' + params.toString());
                this.availableCount = res.count;
                this.count = this.availableCount;
            } catch (e) { this.availableCount = null; }
        }, 200);
    },

    get currentQuestion() {
        return this.questions[this.currentIndex] || null;
    },

    get currentFormat() {
        if (this.mode !== 'mixed') return this.mode;
        const q = this.currentQuestion;
        if (!q) return 'flashcard';
        // Cycle through formats, prefer MCQ if options exist
        if (q.mcq_options && q.mcq_options.length >= 4) {
            const formats = ['flashcard', 'mcq', 'typed'];
            return formats[this.currentIndex % 3];
        }
        return ['flashcard', 'typed'][this.currentIndex % 2];
    },

    get progressPct() {
        if (!this.questions.length) return 0;
        return Math.round((this.currentIndex / this.questions.length) * 100);
    },

    // ── Quiz state persistence (DB-backed, cross-device) ───────────────────
    async _loadSavedQuizzes() {
        try {
            const sessions = await API.get('/quiz/in-progress');
            this.savedQuizzes = sessions.map(s => ({
                ...s,
                questionSources: JSON.parse(s.question_sources_json || '[]'),
            }));
        } catch (e) {
            this.savedQuizzes = [];
        }
    },

    async resumeQuiz(saved) {
        try {
            const data = await API.get('/quiz/' + saved.id + '/resume');
            this.sessionId       = data.session_id;
            this.questions       = data.questions;
            this.currentIndex    = data.current_index ?? 0;
            this.mode            = data.quiz_mode || 'mixed';
            this.questionSources = data.question_sources || [];
            this.phase           = 'quiz';
            this.resetCard();
        } catch (e) {
            $store.app.showToast('Could not resume quiz — it may have been completed already.', 'error');
            await this._loadSavedQuizzes();
        }
    },

    async deleteSavedQuiz(id) {
        try {
            await API.del('/quiz/' + id + '/progress');
        } catch (e) { /* ignore */ }
        this.savedQuizzes = this.savedQuizzes.filter(s => s.id !== id);
    },

    async quitQuiz() {
        // Progress is already persisted after each question — just return to setup
        this.sessionId = null;
        this.phase = 'setup';
        this.resetCard();
        await this._loadSavedQuizzes();
    },
    // ────────────────────────────────────────────────────────────────────────

    async startQuiz() {
        this.startingQuiz = true;
        try {
            const res = await API.post('/quiz/start', {
                subject_id: this.subjectId || null,
                category_id: this.categoryId || null,
                question_sources: this.questionSources.length === 1 ? this.questionSources : null,
                count: this.count,
                mode: this.mode,
            });
            if (!res.session_id) {
                $store.app.showToast(res.message || 'No cards due for review', 'info');
                return;
            }
            this.sessionId    = res.session_id;
            this.questions    = res.questions;
            this.currentIndex = 0;
            this.phase        = 'quiz';
            this.resetCard();
            // questions_json already stored by the backend at session creation
        } catch (e) {
            $store.app.showToast(e.message, 'error');
        } finally {
            this.startingQuiz = false;
        }
    },

    resetCard() {
        this.showAnswer = false;
        this.typedAnswer = '';
        this.selectedOption = null;
        this.result = null;
        this.selectedQuality = null;
        this.showSource = false;
        this.startTime = Date.now();
    },

    async revealFlashcard() {
        this.showAnswer = true;
    },

    async rateAndNext(quality) {
        // Record the SRS rating without showing a correct/incorrect result
        const elapsed = Date.now() - this.startTime;
        this.submitting = true;
        try {
            await API.post('/quiz/' + this.sessionId + '/answer', {
                question_id: this.currentQuestion.id,
                quiz_format: 'flashcard',
                student_answer: null,
                quality_rating: quality,
                time_taken_ms: elapsed,
            });
        } catch (e) {
            // Advance even if save fails
        } finally {
            this.submitting = false;
        }
        this.nextQuestion();
    },

    tryAgain() {
        this.result = null;
        this.selectedOption = null;
        this.typedAnswer = '';
        this.startTime = Date.now();
    },

    async submitMCQ() {
        if (!this.selectedOption) return;
        await this.submitAnswer('mcq', this.selectedOption, null);
    },

    async submitTyped() {
        if (!this.typedAnswer.trim()) return;
        await this.submitAnswer('typed', this.typedAnswer, null);
    },

    async submitAnswer(format, answer, quality) {
        this.submitting = true;
        const elapsed = Date.now() - this.startTime;
        try {
            this.result = await API.post('/quiz/' + this.sessionId + '/answer', {
                question_id: this.currentQuestion.id,
                quiz_format: format,
                student_answer: answer,
                quality_rating: quality,
                time_taken_ms: elapsed,
            });
        } catch (e) {
            $store.app.showToast(e.message, 'error');
        } finally {
            this.submitting = false;
        }
    },

    nextQuestion() {
        this.currentIndex++;
        if (this.currentIndex >= this.questions.length) {
            this.finishQuiz();
        } else {
            this.resetCard();
            // Fire-and-forget: persist current index so quiz can be resumed on another device
            API.put('/quiz/' + this.sessionId + '/progress', { current_index: this.currentIndex })
               .catch(() => {});
        }
    },

    async finishQuiz() {
        // Remove from in-progress list locally (complete endpoint clears questions_json)
        this.savedQuizzes = this.savedQuizzes.filter(s => s.id !== this.sessionId);
        try {
            this.summary = await API.post('/quiz/' + this.sessionId + '/complete');
        } catch (e) {
            // Still show summary from local data
        }
        this.phase = 'summary';
    }
}">
    <!-- LIGHTBOX OVERLAY -->
    <div x-show="lightboxSrc"
         x-transition:enter="transition ease-out duration-150"
         x-transition:enter-start="opacity-0"
         x-transition:enter-end="opacity-100"
         x-transition:leave="transition ease-in duration-100"
         x-transition:leave-start="opacity-100"
         x-transition:leave-end="opacity-0"
         @click="lightboxSrc = null"
         @keydown.escape.window="lightboxSrc = null"
         class="fixed inset-0 z-50 flex items-center justify-center bg-black/80 cursor-zoom-out p-4">
        <img :src="lightboxSrc"
             @click.stop
             class="max-w-full max-h-full rounded-lg shadow-2xl object-contain">
        <button @click="lightboxSrc = null"
                class="absolute top-4 right-4 text-white/80 hover:text-white bg-black/40 rounded-full p-1.5 transition">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
            </svg>
        </button>
    </div>

    <!-- SETUP PHASE -->
    <div x-show="phase === 'setup'">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 items-start">

        <!-- Left column: Start a Quiz -->
        <div>
        <h2 class="text-2xl font-bold text-gray-800 mb-4">Start a Quiz</h2>
        <div class="bg-white rounded-xl shadow-sm p-6 w-full">
            <div class="space-y-5">
                <!-- Subject buttons -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Subject</label>
                    <div class="flex flex-wrap gap-2">
                        <button @click="selectSubject(null)"
                                :class="subjectId === '' ? 'bg-indigo-600 text-white' : 'bg-gray-100 text-gray-700 hover:bg-gray-200'"
                                class="px-3 py-2 rounded-lg text-sm font-medium transition">
                            All
                        </button>
                        <template x-for="s in subjects" :key="s.id">
                            <button @click="selectSubject(s.id)"
                                    :class="subjectId == s.id ? 'bg-indigo-600 text-white' : 'bg-gray-100 text-gray-700 hover:bg-gray-200'"
                                    class="px-3 py-2 rounded-lg text-sm font-medium transition"
                                    x-text="s.name">
                            </button>
                        </template>
                    </div>
                </div>

                <!-- Category buttons (shown when a subject with categories is selected) -->
                <div x-show="subjectId && subjectCategories[subjectId]?.length > 0"
                     x-transition:enter="transition ease-out duration-150"
                     x-transition:enter-start="opacity-0 -translate-y-1"
                     x-transition:enter-end="opacity-100 translate-y-0">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Category</label>
                    <div class="flex flex-wrap gap-2">
                        <button @click="categoryId = null"
                                :class="!categoryId ? 'bg-indigo-600 text-white' : 'bg-gray-100 text-gray-700 hover:bg-gray-200'"
                                class="px-3 py-2 rounded-lg text-sm font-medium transition">
                            All
                        </button>
                        <template x-for="c in (subjectCategories[subjectId] || [])" :key="c.id">
                            <button @click="categoryId = c.id"
                                    :class="categoryId === c.id ? 'bg-indigo-600 text-white' : 'bg-gray-100 text-gray-700 hover:bg-gray-200'"
                                    class="px-3 py-2 rounded-lg text-sm font-medium transition"
                                    x-text="c.name">
                            </button>
                        </template>
                    </div>
                </div>

                <!-- Question source filter -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Question Source</label>
                    <div class="flex flex-wrap gap-2">
                        <template x-for="src in [
                            {id: 'ai_generated', label: '📚 Knowledge Organiser'},
                            {id: 'past_paper',   label: '📄 Past Paper'}
                        ]" :key="src.id">
                            <button @click="questionSources.includes(src.id)
                                        ? questionSources = questionSources.filter(s => s !== src.id)
                                        : questionSources = [...questionSources, src.id]"
                                    :class="questionSources.includes(src.id)
                                        ? 'bg-indigo-600 text-white'
                                        : 'bg-gray-100 text-gray-700 hover:bg-gray-200'"
                                    class="px-3 py-2 rounded-lg text-sm font-medium transition"
                                    x-text="src.label">
                            </button>
                        </template>
                    </div>
                    <p class="text-xs text-gray-400 mt-1.5" x-show="questionSources.length === 1">
                        <span x-text="questionSources[0] === 'ai_generated'
                            ? 'Knowledge Organiser questions only'
                            : 'Past Paper questions only'"></span>
                    </p>
                </div>

                <div>
                    <div class="flex justify-between items-baseline mb-1">
                        <label class="text-sm font-medium text-gray-700">
                            Questions: <span x-text="count"></span>
                        </label>
                        <span x-show="availableCount !== null"
                              class="text-xs font-medium"
                              :class="availableCount === 0
                                  ? 'text-red-400'
                                  : availableCount < count
                                      ? 'text-amber-500'
                                      : 'text-gray-400'"
                              x-text="availableCount === 0
                                  ? 'None available'
                                  : availableCount < count
                                      ? 'only ' + availableCount + ' available'
                                      : availableCount + ' available'">
                        </span>
                    </div>
                    <input type="range" x-model.number="count" min="5" :max="availableCount ?? 50" step="5"
                           class="w-full accent-indigo-600">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Mode</label>
                    <div class="grid grid-cols-2 gap-2">
                        <template x-for="m in [{id:'mixed',label:'Mixed'},{id:'flashcard',label:'Flashcard'},{id:'mcq',label:'Multiple Choice'},{id:'typed',label:'Type Answer'}]" :key="m.id">
                            <button @click="mode = m.id"
                                    :class="mode === m.id ? 'bg-indigo-600 text-white' : 'bg-gray-100 text-gray-700 hover:bg-gray-200'"
                                    class="px-3 py-2 rounded-lg text-sm font-medium transition"
                                    x-text="m.label">
                            </button>
                        </template>
                    </div>
                </div>

                <button @click="startQuiz()" :disabled="startingQuiz"
                        class="w-full bg-indigo-600 text-white py-2.5 rounded-lg font-medium hover:bg-indigo-700 disabled:opacity-75 transition flex items-center justify-center gap-2">
                    <template x-if="startingQuiz">
                        <span class="flex items-center gap-2">
                            <svg class="animate-spin h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                            </svg>
                            Preparing quiz…
                        </span>
                    </template>
                    <template x-if="!startingQuiz">
                        <span>Start Quiz</span>
                    </template>
                </button>
            </div>
        </div>
        </div><!-- end left column -->

        <!-- Right column: Continue a Quiz -->
        <div x-show="savedQuizzes.length > 0" class="w-full">
            <h2 class="text-2xl font-bold text-gray-800 mb-4">Continue a Quiz</h2>
            <div class="space-y-3">
                <template x-for="sq in savedQuizzes" :key="sq.id">
                    <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-4">
                        <!-- Header -->
                        <div class="flex items-start justify-between gap-2 mb-3">
                            <div class="min-w-0">
                                <p class="font-medium text-gray-800 text-sm truncate" x-text="sq.subject_name || 'All Subjects'"></p>
                                <p x-show="sq.category_name" class="text-xs text-gray-400 mt-0.5 truncate" x-text="sq.category_name"></p>
                            </div>
                            <button @click="deleteSavedQuiz(sq.id)"
                                    class="text-gray-300 hover:text-red-400 transition shrink-0 mt-0.5"
                                    title="Discard">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                                </svg>
                            </button>
                        </div>
                        <!-- Mode + Source badges -->
                        <div class="flex flex-wrap gap-1.5 mb-3">
                            <span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-indigo-50 text-indigo-600"
                                  x-text="{mixed:'Mixed',flashcard:'Flashcard',mcq:'Multiple Choice',typed:'Type Answer'}[sq.quiz_mode] || sq.quiz_mode">
                            </span>
                            <span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-gray-100 text-gray-500"
                                  x-text="sq.questionSources?.length === 1
                                      ? (sq.questionSources[0] === 'ai_generated' ? '📚 KO Only' : '📄 Past Paper Only')
                                      : '📚📄 All Sources'">
                            </span>
                        </div>
                        <!-- Progress -->
                        <div class="mb-3">
                            <div class="flex justify-between text-xs text-gray-400 mb-1">
                                <span x-text="sq.current_index + ' / ' + sq.total_questions + ' answered'"></span>
                                <span x-text="Math.round(sq.current_index / sq.total_questions * 100) + '%'"></span>
                            </div>
                            <div class="w-full bg-gray-100 rounded-full h-1.5">
                                <div class="bg-indigo-500 h-1.5 rounded-full transition-all"
                                     :style="'width:' + Math.round(sq.current_index / sq.total_questions * 100) + '%'"></div>
                            </div>
                        </div>
                        <button @click="resumeQuiz(sq)"
                                class="w-full bg-indigo-600 text-white py-2 rounded-lg text-sm font-medium hover:bg-indigo-700 transition">
                            Continue →
                        </button>
                    </div>
                </template>
            </div>
        </div><!-- end right column -->

        </div><!-- end grid -->
    </div>

    <!-- QUIZ PHASE -->
    <div x-show="phase === 'quiz'" class="max-w-2xl mx-auto">
        <!-- Progress bar -->
        <div class="mb-4">
            <div class="flex justify-between text-sm text-gray-500 mb-1">
                <span x-text="(currentIndex + 1) + ' / ' + questions.length"></span>
                <div class="flex items-center gap-3">
                    <span x-text="currentQuestion?.subject_name || ''"></span>
                    <button @click="quitQuiz()"
                            class="text-xs text-gray-400 hover:text-red-500 transition">Quit</button>
                </div>
            </div>
            <div class="w-full bg-gray-200 rounded-full h-2">
                <div class="bg-indigo-600 h-2 rounded-full transition-all duration-300"
                     :style="'width: ' + progressPct + '%'"></div>
            </div>
        </div>

        <div x-show="currentQuestion" class="bg-white rounded-xl shadow-sm p-6">
            <!-- Question -->
            <p class="text-lg font-medium text-gray-800 mb-4" x-text="currentQuestion?.question_text"></p>

            <!-- Question image intentionally hidden: source screenshots contain the answer -->

            <!-- FLASHCARD FORMAT -->
            <div x-show="currentFormat === 'flashcard'">
                <!-- Pre-reveal -->
                <div x-show="!showAnswer" class="text-center">
                    <button @click="revealFlashcard()"
                            class="bg-indigo-600 text-white px-6 py-3 rounded-lg font-medium hover:bg-indigo-700 transition">
                        Show Answer
                    </button>
                </div>
                <!-- Post-reveal: answer + rate + next -->
                <div x-show="showAnswer" class="space-y-4">
                    <div class="bg-green-50 rounded-lg p-4">
                        <p class="text-sm font-medium text-green-700">Answer:</p>
                        <p class="text-green-800 mt-1" x-text="currentQuestion?.answer_text"></p>
                    </div>
                    <p class="text-sm text-gray-500 text-center">How well did you know this?</p>
                    <div class="grid grid-cols-4 gap-2">
                        <button @click="showAnswer = false; selectedQuality = null"
                                class="py-2.5 rounded-lg text-sm font-medium bg-gray-100 text-gray-600 hover:bg-gray-200 transition">
                            Hide
                        </button>
                        <button @click="selectedQuality = 3" :disabled="submitting"
                                :class="selectedQuality === 3 ? 'ring-2 ring-yellow-400 bg-yellow-200' : 'bg-yellow-100'"
                                class="py-2.5 rounded-lg text-sm font-medium text-yellow-700 hover:bg-yellow-200 transition">
                            Hard
                        </button>
                        <button @click="selectedQuality = 4" :disabled="submitting"
                                :class="selectedQuality === 4 ? 'ring-2 ring-blue-400 bg-blue-200' : 'bg-blue-100'"
                                class="py-2.5 rounded-lg text-sm font-medium text-blue-700 hover:bg-blue-200 transition">
                            Good
                        </button>
                        <button @click="selectedQuality = 5" :disabled="submitting"
                                :class="selectedQuality === 5 ? 'ring-2 ring-green-400 bg-green-200' : 'bg-green-100'"
                                class="py-2.5 rounded-lg text-sm font-medium text-green-700 hover:bg-green-200 transition">
                            Easy
                        </button>
                    </div>
                    <button @click="rateAndNext(selectedQuality || 3)" :disabled="submitting"
                            class="w-full bg-indigo-600 text-white py-2.5 rounded-lg font-medium hover:bg-indigo-700 disabled:opacity-50 transition">
                        <span x-show="!submitting" x-text="currentIndex >= questions.length - 1 ? 'Finish Quiz' : 'Next Question'"></span>
                        <span x-show="submitting">Saving…</span>
                    </button>
                </div>
            </div>

            <!-- MCQ FORMAT -->
            <div x-show="currentFormat === 'mcq' && !result" class="space-y-2">
                <template x-for="(opt, idx) in (currentQuestion?.mcq_options || [])" :key="idx">
                    <button @click="selectedOption = opt.option_text"
                            :class="selectedOption === opt.option_text ? 'border-indigo-600 bg-indigo-50' : 'border-gray-200 hover:border-gray-300'"
                            class="w-full text-left p-3 rounded-lg border-2 text-sm transition"
                            x-text="opt.option_text">
                    </button>
                </template>
                <button @click="submitMCQ()" :disabled="!selectedOption || submitting"
                        class="w-full bg-indigo-600 text-white py-2.5 rounded-lg font-medium hover:bg-indigo-700 disabled:opacity-50 transition mt-3">
                    <span x-show="!submitting">Submit</span>
                    <span x-show="submitting">Checking...</span>
                </button>
            </div>

            <!-- TYPED FORMAT -->
            <div x-show="currentFormat === 'typed' && !result" class="space-y-3">
                <textarea x-model="typedAnswer" rows="3" placeholder="Type your answer..."
                          @keydown.ctrl.enter="submitTyped()"
                          class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none text-sm"></textarea>
                <button @click="submitTyped()" :disabled="!typedAnswer.trim() || submitting"
                        class="w-full bg-indigo-600 text-white py-2.5 rounded-lg font-medium hover:bg-indigo-700 disabled:opacity-50 transition">
                    <span x-show="!submitting">Submit Answer</span>
                    <span x-show="submitting">AI is judging...</span>
                </button>
            </div>

            <!-- RESULT (shown after MCQ/Typed answer only) -->
            <div x-show="result && currentFormat !== 'flashcard'" class="space-y-3 mt-4">
                <div class="rounded-lg p-4"
                     :class="result?.is_correct ? 'bg-green-50' : 'bg-red-50'">
                    <p class="font-medium text-sm"
                       :class="result?.is_correct ? 'text-green-700' : 'text-red-700'"
                       x-text="result?.is_correct ? 'Correct!' : 'Incorrect'"></p>
                    <p class="text-sm mt-1"
                       :class="result?.is_correct ? 'text-green-600' : 'text-red-600'"
                       x-text="'Answer: ' + (result?.correct_answer || '')"></p>
                    <p x-show="result?.feedback" class="text-sm mt-2 text-gray-600" x-text="result?.feedback"></p>
                </div>
                <!-- Next button for both correct and incorrect -->
                <button x-show="result" @click="nextQuestion()"
                        class="w-full bg-indigo-600 text-white py-2.5 rounded-lg font-medium hover:bg-indigo-700 transition">
                    <span x-text="currentIndex >= questions.length - 1 ? 'Finish Quiz' : 'Next Question'"></span>
                </button>
            </div>

            <!-- Source section -->
            <div x-show="currentQuestion?.source_context || currentQuestion?.batch_id"
                 class="mt-4 pt-3 border-t border-gray-100">
                <button @click="showSource = !showSource"
                        class="flex items-center gap-1.5 text-xs text-gray-400 hover:text-gray-600 transition">
                    <svg class="w-3.5 h-3.5 transition-transform duration-200"
                         :class="showSource ? 'rotate-90' : ''"
                         fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                    </svg>
                    <span x-text="showSource ? 'Hide Source' : 'View Source'"></span>
                </button>
                <div x-show="showSource" x-transition class="mt-3 space-y-3">
                    <!-- Full source page thumbnail -->
                    <div x-show="currentQuestion?.batch_id && currentQuestion?.page_number">
                        <p class="text-xs text-gray-400 mb-1.5">Source page:</p>
                        <img :src="'/images/batch_' + currentQuestion.batch_id + '/page_' + currentQuestion.page_number + '_full.png'"
                             @click="lightboxSrc = '/images/batch_' + currentQuestion.batch_id + '/page_' + currentQuestion.page_number + '_full.png'"
                             class="max-h-52 w-auto rounded-lg border border-gray-200 shadow-sm cursor-zoom-in"
                             alt="Source page">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- SUMMARY PHASE -->
    <div x-show="phase === 'summary'" class="max-w-md mx-auto">
        <div class="bg-white rounded-xl shadow-sm p-8 text-center">
            <h2 class="text-2xl font-bold text-gray-800 mb-2">Quiz Complete!</h2>

            <div class="my-6">
                <div class="text-5xl font-bold"
                     :class="(summary?.correct || 0) / (summary?.total || 1) >= 0.7 ? 'text-green-600' : 'text-yellow-600'"
                     x-text="Math.round(((summary?.correct || 0) / (summary?.total || 1)) * 100) + '%'"></div>
                <p class="text-gray-500 mt-1">accuracy</p>
            </div>

            <div class="grid grid-cols-3 gap-4 mb-6">
                <div class="bg-green-50 rounded-lg p-3">
                    <div class="text-xl font-bold text-green-600" x-text="summary?.correct || 0"></div>
                    <div class="text-xs text-green-700">Correct</div>
                </div>
                <div class="bg-red-50 rounded-lg p-3">
                    <div class="text-xl font-bold text-red-600" x-text="summary?.incorrect || 0"></div>
                    <div class="text-xs text-red-700">Incorrect</div>
                </div>
                <div class="bg-gray-50 rounded-lg p-3">
                    <div class="text-xl font-bold text-gray-600" x-text="summary?.total || 0"></div>
                    <div class="text-xs text-gray-700">Total</div>
                </div>
            </div>

            <div class="flex gap-3">
                <button @click="phase = 'setup'"
                        class="flex-1 bg-indigo-600 text-white py-2.5 rounded-lg font-medium hover:bg-indigo-700 transition">
                    Quiz Again
                </button>
                <a href="#home"
                   class="flex-1 bg-gray-100 text-gray-700 py-2.5 rounded-lg font-medium hover:bg-gray-200 transition text-center">
                    Home
                </a>
            </div>
        </div>
    </div>
</div>
