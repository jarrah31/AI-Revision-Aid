services:
  web:
    # ── Option A: use the published image (recommended for end-users) ──────────
    # Replace <owner> with your GitHub username / org once the image is pushed.
    # image: ghcr.io/<owner>/revisionaid:latest

    # ── Option B: build locally from source (default for development) ─────────
    build: .

    ports:
      - "8000:8000"
    volumes:
      # Persist the SQLite database and all user-uploaded files
      - ./data:/app/data
    environment:
      # Optional: pre-seed the Anthropic API key from a host env var or .env
      # file. If left blank, set it via Admin → Settings after first login.
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    restart: unless-stopped
