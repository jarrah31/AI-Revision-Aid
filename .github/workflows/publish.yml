name: Publish Docker image

# Triggers:
#   • Push a version tag  (git tag v1.2.3 && git push --tags)
#     → publishes  ghcr.io/<owner>/revisionaid:1.2.3
#                  ghcr.io/<owner>/revisionaid:1.2
#                  ghcr.io/<owner>/revisionaid:1
#                  ghcr.io/<owner>/revisionaid:latest
#
#   • Merge / push to main
#     → publishes  ghcr.io/<owner>/revisionaid:latest  (rolling)

on:
  push:
    branches: ["main", "master"]
    tags: ["v*.*.*"]

# GITHUB_TOKEN needs write permission to push packages
permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # e.g. jarrah31/ai-revision-aid

jobs:
  # ── Must pass tests before publishing ────────────────────────────────────────
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - run: pip install -r requirements.txt -r requirements-dev.txt

      - run: mkdir -p data/images data/pdfs lancedb

      - run: pytest tests/ --tb=short -q --strict-markers
        env:
          ANTHROPIC_API_KEY: ""
          JWT_SECRET: "ci-publish-secret"

  # ── Build and push ────────────────────────────────────────────────────────────
  publish:
    name: Build & push image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Build for both Intel (amd64) and Apple-Silicon / AWS-Graviton (arm64)
      - name: Set up QEMU (cross-platform emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Log in to GitHub Container Registry using the built-in token — no
      # secrets to configure.
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Generate image tags and labels from git metadata:
      #   • version tag v1.2.3  → :1.2.3, :1.2, :1, :latest
      #   • branch push (main)  → :latest
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
